<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>
<body>

<!-- MODAL CONFIGURACIÓN -->
<div class="modal fade show" id="configModal" tabindex="-1" style="display:block; background: rgba(0,0,0,0.6);">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title">Configuración del Contribuyente</h5>
            </div>

            <div class="modal-body">
                <form id="configForm">
                    <input type="text" name="nit" class="form-control mb-3" placeholder="NIT" required>
                    <input type="text" name="dui" class="form-control mb-3" placeholder="DUI (opcional)">
                    <input type="text" name="nombre" class="form-control mb-3" placeholder="Nombre completo" required>
                    
                    <button class="btn btn-primary w-100">Guardar y continuar</button>
                </form>
            </div>

        </div>
    </div>
</div>

<div class="container py-4 py-md-5" id="mainContent" style="display:none;">

    <!-- HEADER -->
    <div class="text-center mb-4 mb-md-5">
        <h1 class="fw-bold">Sistema AI Fiscal</h1>
        <p class="text-muted">Procesamiento inteligente de DTE + RAG</p>
    </div>

    <div class="row g-4">

        <!-- UPLOAD -->
        <div class="col-12 col-md-6">
            <div class="card p-3 p-md-4 shadow-sm h-100">

                <h5 class="mb-3">📂 Cargar datos</h5>

                <form id="uploadForm">
    <input type="file" name="files" multiple class="form-control mb-3" required>
</form>

                <div id="uploadStatus" class="mt-3 text-success fw-bold small"></div>

            </div>
        </div>

        <!-- RAG -->
        <div class="col-12 col-md-6">
            <div class="card p-3 p-md-4 shadow-sm h-100">

                <h5 class="mb-3">🤖 Consultar</h5>

                <form id="questionForm">
                    <input type="text" name="pregunta" class="form-control mb-3" placeholder="Ej: total de ventas">
                    <button class="btn btn-dark w-100">Preguntar</button>
                </form>

                <div id="chatBox" class="mt-3 chat-box"></div>

            </div>
        </div>

        <!-- EXCEL -->
        <div class="col-12">
            <div class="card p-3 p-md-4 shadow-sm text-center">

                <h5 class="mb-3">📊 Generar Excel</h5>

                <!-- YA NO SE SUBEN ARCHIVOS AQUÍ -->
                <form id="excelForm">
                    <button type="submit" class="btn btn-success w-100">
                        📊 Generar y Descargar Excel
                    </button>
                    <div id="inconsistenciasBox"></div>
                </form>

                <div id="loadingExcel" class="text-muted mt-3 small d-none">
                    ⏳ Generando Excel... esto puede tardar unos segundos
                </div>

            </div>
        </div>

    </div>
</div>

<!-- JS externo -->
<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
