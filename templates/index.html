<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Anexos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .alert {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            display: none;
            margin-top: 15px;
        }
    </style>

    <script>
        function mostrarCarga() {
            document.getElementById("loading").style.display = "block";
        }
    </script>

</head>
<body>

<div class="container">

    <h2>📊 Generador de Anexos</h2>

    <!-- MENSAJES -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert error">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/procesar" method="post" enctype="multipart/form-data" onsubmit="mostrarCarga()">
        <input type="file" name="files" multiple required>
        <button type="submit">Procesar Archivos</button>
    </form>

    <hr>

    <h3>Hacer pregunta</h3>

<form action="/preguntar" method="post">
    <input type="text" name="pregunta" placeholder="Ej: total de ventas" required>
    <button type="submit">Preguntar</button>
</form>

    <div id="loading" class="loading">
        ⏳ Procesando archivos...
    </div>

</div>

</body>
</html>
